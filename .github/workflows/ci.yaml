name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  conan:
    name: conan (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install conan
        run: pipx install conan

      - name: Detect profile
        run: conan profile detect

      - name: Build, test and package depth_codec
        run: conan create depth_codec --build=missing

  colcon:
    name: colcon (ROS 2 ${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [jazzy, lyrical]
    container: ros:${{ matrix.distro }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: ws/src/depth_image_compression

      - name: Install dependencies
        run: |
          apt-get update
          rosdep update || true
          rosdep install --from-paths ws/src --ignore-src -y

      - name: Build
        working-directory: ws
        run: |
          . /opt/ros/${{ matrix.distro }}/setup.sh
          colcon build --event-handlers console_direct+ \
            --cmake-args -DDEPTH_CODEC_MARCH_NATIVE=OFF

      - name: Test
        working-directory: ws
        run: |
          . /opt/ros/${{ matrix.distro }}/setup.sh
          colcon test --event-handlers console_direct+
          colcon test-result --verbose
