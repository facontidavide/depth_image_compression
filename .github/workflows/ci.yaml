name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pixi:
    name: pixi (ROS-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true
      - name: Build and test depth_codec
        run: pixi run test

  pixi-ros:
    name: pixi (RoboStack ROS 2 jazzy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true
      - name: Build and test both packages with colcon
        run: pixi run -e ros test-ros

  colcon:
    name: colcon (ROS 2 ${{ matrix.distro }}, apt)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [jazzy, lyrical]
    container: ros:${{ matrix.distro }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: ws/src/depth_image_compression

      - name: Install dependencies
        run: |
          apt-get update
          rosdep update || true
          rosdep install --from-paths ws/src --ignore-src -y

      - name: Build
        working-directory: ws
        run: |
          . /opt/ros/${{ matrix.distro }}/setup.sh
          colcon build --event-handlers console_direct+ \
            --cmake-args -DDEPTH_CODEC_MARCH_NATIVE=OFF

      - name: Test
        working-directory: ws
        run: |
          . /opt/ros/${{ matrix.distro }}/setup.sh
          colcon test --event-handlers console_direct+
          colcon test-result --verbose
